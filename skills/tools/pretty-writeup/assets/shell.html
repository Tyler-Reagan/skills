<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TITLE</title>
<!-- LIGHT THEME ONLY: paste the Google Fonts <link> from assets/themes/light.css here. Dark theme adds nothing. -->
<style>
  /* Extend with token-backed classes below when needed; do not replace :root. */
  /* ============================================================
     THEME TOKENS  (dark default — swap this :root for light.css)
     ============================================================ */
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --border2:#3d444d;
    --fg:#c9d1d9; --muted:#8b949e; --faint:#6e7681;
    --accent:#58a6ff; --accent-bg:#0f1d2e; --accent-line:#1f3a5f;
    --green:#3fb950; --green-bg:#0f1f14; --green-line:#1f3d28;
    --amber:#d29922; --violet:#bc8cff; --violet-bg:#1a1229; --violet-line:#3d2a5c;
    --red:#f85149;
    --amber-bg:#231c0f; --amber-line:#3d3115;
    --red-bg:#2a1514; --red-line:#48201e;
    --code-bg:#1a2029; --code-fg:#a9c7ff;
    --pre-bg:#0b1020; --pre-fg:#d7deea;
    --radius:8px; --radius-lg:10px;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --text-base:17px; --text-sm:14px; --text-xs:12px;
    --text-lg:19px; --text-xl:22px;
    --h1-size:30px; --line-height:1.62;
  }

  /* ============================================================
     COMPONENT STYLESHEET  (theme-agnostic — reads tokens only)
     ============================================================ */
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font:var(--text-base)/var(--line-height) var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1040px;margin:0 auto;padding:32px 24px 80px}
  .mono{font-family:var(--font-mono)}

  h1{font-size:var(--h1-size);font-weight:700;margin:0 0 5px;letter-spacing:-.01em;line-height:1.18}
  h1 .accent{color:var(--accent)}
  .sub{color:var(--muted);margin:0 0 18px;font-size:var(--text-base);max-width:720px}
  h2{font-size:var(--text-xl);font-weight:700;margin:42px 0 12px;padding-bottom:7px;
    border-bottom:1px solid var(--border2);letter-spacing:-.01em}
  h3{font-size:var(--text-lg);margin:24px 0 8px;color:var(--accent)}
  p{margin:10px 0}
  ul{margin:10px 0;padding-left:22px} li{margin:7px 0}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  em{color:var(--fg)}

  code{font-family:var(--font-mono);font-size:.85em;background:var(--code-bg);
    border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--code-fg)}

  /* brief register — masthead (no panel, no gradient) */
  .masthead{margin:0 0 28px}
  .masthead-kicker{font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:.1em;
    text-transform:uppercase;color:var(--accent);margin:0 0 8px}
  .masthead .sub{margin-bottom:14px}
  .masthead .tags{margin-bottom:0}

  /* brief register — section panels */
  .block{--block-accent:var(--accent);--block-tag-bg:var(--accent-bg);--block-tag-line:var(--accent-line);
    position:relative;margin:32px 0;padding:26px 30px 30px;border-radius:14px;border:1px solid var(--border);
    background:linear-gradient(160deg,color-mix(in srgb,var(--block-accent) 6%,var(--panel)) 0%,var(--panel) 55%,var(--bg) 100%);
    overflow:hidden}
  .block::after{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--block-accent);border-radius:14px 0 0 14px}
  .block h2{margin:0 0 18px;padding:0;border-bottom:none}
  .block-today{--block-accent:var(--accent);--block-tag-bg:var(--accent-bg);--block-tag-line:var(--accent-line)}
  .block-prior{--block-accent:var(--amber);--block-tag-bg:var(--amber-bg);--block-tag-line:var(--amber-line)}
  .block-now{--block-accent:var(--green);--block-tag-bg:var(--green-bg);--block-tag-line:var(--green-line)}
  .block-compare{--block-accent:var(--violet);--block-tag-bg:var(--violet-bg);--block-tag-line:var(--violet-line)}
  .block-close{--block-accent:var(--accent)}

  /* brief register — fact triads */
  .facts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
  .fact{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:15px 17px}
  .fact.accent{background:var(--accent-bg);border-color:var(--accent-line)}
  .fact.disk{background:var(--green-bg);border-color:var(--green-line)}
  .fact.mem{background:var(--amber-bg);border-color:var(--amber-line)}
  .fact-label{font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:.06em;text-transform:uppercase;
    color:var(--faint);margin-bottom:7px}
  .fact.accent .fact-label{color:var(--accent)}
  .fact.disk .fact-label{color:var(--green)}
  .fact.mem .fact-label{color:var(--amber)}
  .fact-punch{margin:0;font-size:var(--text-lg);font-weight:600;line-height:1.35;letter-spacing:-.01em}
  .fact-detail{margin:5px 0 0;font-size:var(--text-sm);color:var(--muted);line-height:1.45}

  /* brief register — point cards */
  .points{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:4px 0 8px}
  .point{--point-color:var(--block-accent,var(--accent));display:flex;gap:12px;align-items:flex-start;
    padding:15px 17px;border-radius:var(--radius-lg);border:1px solid var(--border);
    border-left:3px solid var(--point-color);background:color-mix(in srgb,var(--point-color) 4%,var(--bg))}
  .point-marker{flex:none;width:8px;height:8px;margin-top:8px;border-radius:50%;background:var(--point-color);
    box-shadow:0 0 8px color-mix(in srgb,var(--point-color) 55%,transparent)}
  .point-head{margin:0 0 5px;font-size:var(--text-base);font-weight:600;line-height:1.35;color:var(--fg)}
  .point-copy{margin:0;font-size:var(--text-sm);color:var(--muted);line-height:1.55}

  /* brief register — section end-note */
  .bridge{margin:20px 0 0;padding:15px 19px;border-radius:var(--radius-lg);
    border:1px solid var(--block-tag-line,var(--accent-line));border-left:4px solid var(--block-accent,var(--accent));
    background:var(--block-tag-bg,var(--accent-bg))}
  .bridge-label{display:block;font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:.06em;
    text-transform:uppercase;color:var(--block-accent,var(--accent));margin-bottom:7px}
  .bridge-punch{margin:0;font-size:var(--text-lg);font-weight:600;color:var(--fg);line-height:1.35;letter-spacing:-.01em}

  /* metadata row */
  .meta{display:flex;flex-wrap:wrap;gap:8px 20px;color:var(--muted);font-size:var(--text-sm);margin:12px 0 6px}
  .meta b{color:var(--fg);font-weight:600}

  /* status pill chips */
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 20px}
  .tag{font-family:var(--font-mono);font-size:var(--text-xs);border:1px solid var(--border2);
    border-radius:999px;padding:3px 11px;color:var(--muted);background:var(--panel)}
  .tag.on{border-color:var(--accent-line);color:var(--accent);background:var(--accent-bg)}
  .tag.w{border-color:var(--amber-line);color:var(--amber);background:var(--amber-bg)}
  .tag.g{border-color:var(--green-line);color:var(--green);background:var(--green-bg)}
  .tag.v{border-color:var(--violet-line);color:var(--violet);background:var(--violet-bg)}

  /* stat-card grid */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:18px 0}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .kpi .n{font-family:var(--font-mono);font-size:23px;font-weight:700;color:var(--accent);line-height:1}
  .kpi.good .n{color:var(--green)} .kpi.bad .n{color:var(--red)} .kpi.warn .n{color:var(--amber)}
  .kpi .l{color:var(--muted);font-size:12px;margin-top:7px}

  /* filled callouts — evidence register */
  .key,.note,.stop{border-radius:var(--radius-lg);padding:14px 16px;margin:16px 0;font-size:var(--text-base)}
  .key{background:var(--accent-bg);border:1px solid var(--accent-line)} .key b{color:var(--accent)}
  .note{background:var(--amber-bg);border:1px solid var(--amber-line)} .note b{color:var(--amber)}
  .stop{background:var(--red-bg);border:1px solid var(--red-line);display:flex;gap:11px;align-items:flex-start}
  .stop b{color:var(--red)} .stop svg{flex:none;margin-top:2px}

  /* tables */
  table{border-collapse:collapse;width:100%;margin:14px 0;font-size:var(--text-base)}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:top}
  thead th{font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:.05em;text-transform:uppercase;
    color:var(--faint);border-bottom:1.5px solid var(--border2);font-weight:600}
  tbody tr:last-child td{border-bottom:none}
  td:first-child{font-weight:600}
  td.flags{font-family:var(--font-mono);font-size:12px;white-space:nowrap}
  .ok{color:var(--green);font-weight:600} .x{color:var(--red);font-weight:600} .mid{color:var(--amber);font-weight:600}

  /* code blocks */
  pre{background:var(--pre-bg);color:var(--pre-fg);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;margin:10px 0;overflow-x:auto;font-family:var(--font-mono);font-size:12.5px;line-height:1.6}
  pre .c{color:var(--faint)} pre .k{color:var(--amber)} pre .s{color:var(--green)} pre .f{color:var(--accent)}

  /* horizontal bar charts */
  .bars{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin:14px 0}
  .bar-row{display:grid;grid-template-columns:120px 1fr 96px;align-items:center;gap:10px;margin:7px 0}
  .bar-row .name{font-size:13px}
  .track{background:var(--bg);border:1px solid var(--border);border-radius:4px;height:18px;overflow:hidden}
  .fill{height:100%;border-radius:3px;background:var(--accent)}
  .fill.good{background:var(--green)} .fill.bad{background:var(--red)} .fill.warn{background:var(--amber)}
  .bar-row .val{font-family:var(--font-mono);font-size:12px;color:var(--muted);text-align:right}

  /* hand-built SVG diagrams */
  figure{margin:18px 0}
  .diagram{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;
    box-shadow:0 1px 0 color-mix(in srgb,var(--block-accent,var(--accent)) 25%,transparent),0 10px 32px rgba(0,0,0,.2)}
  .diagram svg{display:block;width:100%;height:auto}
  figcaption{color:var(--muted);font-size:var(--text-sm);margin:10px auto 0;text-align:center;line-height:1.5;
    max-width:640px;padding:9px 16px;border-radius:999px;border:1px solid var(--border);
    background:color-mix(in srgb,var(--block-accent,var(--accent)) 5%,var(--panel))}

  .small{font-size:var(--text-sm);color:var(--faint)}
  .stack{font-family:var(--font-mono);font-size:12px;color:var(--faint);margin-top:14px}
  footer{margin-top:40px;padding:18px 20px;font-size:var(--text-sm);color:var(--muted);
    background:var(--panel);border-radius:var(--radius-lg);border:1px solid var(--border)}
  footer .footer-line{margin:0;line-height:1.5}
  footer .footer-line+.footer-line{margin-top:7px}
  footer .footer-faint{color:var(--faint);font-size:var(--text-xs)}
  footer a{color:var(--accent)}

  @media (max-width:820px){ .facts,.points{grid-template-columns:1fr} }
  @media (max-width:640px){ .kpis{grid-template-columns:1fr 1fr} .bar-row{grid-template-columns:90px 1fr 70px} }
</style>
</head>
<body>
<div class="wrap">

  <!-- AGENT: author the writeup body here.
       Intake -> Substrate (confirm or waiver) -> Distill -> template fit -> HTML.
       Use the kit when it fits; simplify before extending with token-backed classes.
       No HTML without substrate on topic-only intake unless the user waives questions.
       Diagrams: hand-build <svg> inside figure.diagram when the visual earns its place. No raw mermaid. -->

</div>
</body>
</html>
